<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>myWhisper — local audio transcription</title>
    <meta
      name="description"
      content="Transcribe audio files to text entirely in your browser with OpenAI Whisper. No uploads, no servers — your audio never leaves your device."
    />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎙️</text></svg>"
    />
  </head>
  <body>
    <main class="app">
      <header class="app__header">
        <h1 class="app__title">myWhisper</h1>
        <p class="app__tagline">
          Transcribe audio to text — entirely in your browser. Nothing is
          uploaded.
        </p>
      </header>

      <!-- Drop zone / file picker (multiple) -->
      <section
        id="dropzone"
        class="dropzone"
        tabindex="0"
        role="button"
        aria-label="Choose or drop audio files"
      >
        <input
          id="file-input"
          type="file"
          accept="audio/*"
          class="dropzone__input"
          multiple
          hidden
        />
        <div class="dropzone__inner">
          <span class="dropzone__icon" aria-hidden="true">🎙️</span>
          <p class="dropzone__primary">Drop audio files here</p>
          <p class="dropzone__secondary">
            or click to browse · add as many as you like · M4A, MP3, WAV, …
          </p>
        </div>
      </section>

      <!-- Controls -->
      <section class="controls">
        <label class="field">
          <span class="field__label">Model size</span>
          <select id="model-select" class="field__control"></select>
        </label>

        <label class="field">
          <span class="field__label">Language</span>
          <select id="language-select" class="field__control">
            <option value="auto" selected>Auto-detect</option>
          </select>
        </label>

        <label class="field">
          <span class="field__label">Backend</span>
          <select id="backend-select" class="field__control">
            <option value="auto" selected>Auto (WebGPU if available)</option>
            <option value="webgpu">WebGPU</option>
            <option value="wasm">WASM (CPU)</option>
          </select>
        </label>
      </section>

      <button id="transcribe-btn" class="btn btn--primary" disabled>
        Transcribe
      </button>

      <!-- Global status (model loading) -->
      <section id="status" class="status" hidden>
        <p id="status-message" class="status__message"></p>
        <div class="status__bar" hidden>
          <div id="status-bar-fill" class="status__bar-fill"></div>
        </div>
      </section>

      <!-- Queue -->
      <section id="queue-section" class="queue-section" hidden>
        <div class="queue-section__toolbar">
          <h2 id="queue-summary" class="queue-section__heading">Queue</h2>
          <div class="queue-section__actions">
            <label id="timestamps-toggle-label" class="ts-toggle" hidden>
              <input type="checkbox" id="timestamps-toggle" />
              Timestamps
            </label>
            <button id="copy-all-btn" class="btn btn--ghost" hidden>Copy all</button>
            <button id="download-all-btn" class="btn btn--ghost" hidden>
              Download all
            </button>
            <button id="clear-done-btn" class="btn btn--ghost" hidden>
              Clear completed
            </button>
          </div>
        </div>
        <ul id="queue" class="queue"></ul>
      </section>

      <footer class="app__footer">
        Powered by
        <a href="https://github.com/huggingface/transformers.js" target="_blank" rel="noreferrer"
          >Transformers.js</a
        >
        &amp; OpenAI Whisper · runs 100% locally
      </footer>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
