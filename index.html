<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>myWhisper — local audio transcription</title>
    <meta
      name="description"
      content="Transcribe audio files to text entirely in your browser with OpenAI Whisper. No uploads, no servers — your audio never leaves your device."
    />
  </head>
  <body>
    <main class="app">
      <header class="app__header">
        <h1 class="app__title">myWhisper</h1>
        <p class="app__tagline">
          Transcribe audio to text — entirely in your browser. Nothing is
          uploaded.
        </p>
      </header>

      <!-- Drop zone / file picker -->
      <section
        id="dropzone"
        class="dropzone"
        tabindex="0"
        role="button"
        aria-label="Choose or drop an audio file"
      >
        <input
          id="file-input"
          type="file"
          accept="audio/*"
          class="dropzone__input"
          hidden
        />
        <div class="dropzone__inner">
          <span class="dropzone__icon" aria-hidden="true">🎙️</span>
          <p class="dropzone__primary">Drop an audio file here</p>
          <p class="dropzone__secondary">or click to browse · M4A, MP3, WAV, …</p>
        </div>
        <p id="file-name" class="dropzone__filename" hidden></p>
      </section>

      <!-- Controls -->
      <section class="controls">
        <label class="field">
          <span class="field__label">Model size</span>
          <select id="model-select" class="field__control">
            <option value="Xenova/whisper-tiny">Tiny — fastest, ~40 MB</option>
            <option value="Xenova/whisper-base" selected>
              Base — balanced, ~80 MB
            </option>
            <option value="Xenova/whisper-small">
              Small — most accurate, ~250 MB
            </option>
          </select>
        </label>

        <label class="field">
          <span class="field__label">Language</span>
          <select id="language-select" class="field__control">
            <option value="auto" selected>Auto-detect</option>
          </select>
        </label>
      </section>

      <button id="transcribe-btn" class="btn btn--primary" disabled>
        Transcribe
      </button>

      <!-- Status / progress -->
      <section id="status" class="status" hidden>
        <p id="status-message" class="status__message"></p>
        <div class="status__bar" hidden>
          <div id="status-bar-fill" class="status__bar-fill"></div>
        </div>
      </section>

      <!-- Result -->
      <section id="result" class="result" hidden>
        <div class="result__toolbar">
          <h2 class="result__heading">Transcript</h2>
          <div class="result__actions">
            <button id="copy-btn" class="btn btn--ghost">Copy</button>
            <button id="download-btn" class="btn btn--ghost">Download .txt</button>
          </div>
        </div>
        <textarea
          id="transcript"
          class="result__text"
          spellcheck="false"
          aria-label="Transcript text"
        ></textarea>
      </section>

      <footer class="app__footer">
        Powered by
        <a href="https://github.com/huggingface/transformers.js" target="_blank" rel="noreferrer"
          >Transformers.js</a
        >
        &amp; OpenAI Whisper · runs 100% locally
      </footer>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
